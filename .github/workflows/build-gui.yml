name: build-gui
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      # No separate Flutter install: flet build pins an exact Flutter version
      # and installs it itself. A mismatched pre-installed Flutter just makes it
      # prompt "install the required version? [y/n]", which EOFs in CI.
      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - name: Build
        shell: bash
        env:
          PYTHONUTF8: "1"          # flet prints ● spinners; avoid Windows cp1252 crash
          PYTHONIOENCODING: "utf-8"
        run: |
          uv sync --extra gui
          # `yes` answers flet's "install required Flutter? [y/n]" prompt. It
          # gets SIGPIPE when flet exits; disable pipefail so the step's result
          # is flet build's exit code, not yes's broken pipe.
          set +o pipefail
          yes | uv run flet build ${{ matrix.target }} --project email-export-import
      - name: Package bundle
        shell: bash
        run: |
          # shutil.make_archive is cross-platform — Windows Git Bash has no `zip`.
          uv run python -c "import shutil; shutil.make_archive('email-export-import-${{ matrix.target }}', 'zip', 'build/${{ matrix.target }}')"
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: email-export-import-${{ matrix.target }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum email-export-import-*.zip > SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            email-export-import-*.zip
            SHA256SUMS.txt
          generate_release_notes: true

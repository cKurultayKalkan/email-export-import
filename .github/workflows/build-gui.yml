name: build-gui
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Flutter (required by flet build)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - name: Build
        run: |
          uv sync --extra gui
          uv run flet build ${{ matrix.target }} --project email-export-import
      - name: Package bundle
        shell: bash
        run: |
          cd build/${{ matrix.target }}
          zip -r "../../email-export-import-${{ matrix.target }}.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: email-export-import-${{ matrix.target }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum email-export-import-*.zip > SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            email-export-import-*.zip
            SHA256SUMS.txt
          generate_release_notes: true

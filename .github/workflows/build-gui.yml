name: build-gui
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    env:
      # Secrets are not readable in step-level `if:` — surface presence here.
      HAS_MACOS_CERT: ${{ secrets.MACOS_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      # No separate Flutter install: flet build pins an exact Flutter version
      # and installs it itself. A mismatched pre-installed Flutter just makes it
      # prompt "install the required version? [y/n]", which EOFs in CI.
      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - name: Build
        shell: bash
        env:
          PYTHONUTF8: "1"          # flet prints ● spinners; avoid Windows cp1252 crash
          PYTHONIOENCODING: "utf-8"
        run: |
          uv sync --extra gui
          # `yes` answers flet's "install required Flutter? [y/n]" prompt. It
          # gets SIGPIPE when flet exits; disable pipefail so the step's result
          # is flet build's exit code, not yes's broken pipe.
          set +o pipefail
          # --exclude keeps the repo's working files out of the packaged
          # app.zip: without it the whole directory ships — .venv (a second,
          # wrong-version Python), .git (the entire history), tests, docs.
          yes | uv run flet build ${{ matrix.target }} --project email-export-import \
            --exclude .venv .git .github .superpowers .pytest_cache tests docs packaging
      # ---- macOS code signing + notarization (skipped when secrets are absent,
      # e.g. on forks — the build then ships ad-hoc-signed, exactly as before).
      - name: Import signing certificate
        if: runner.os == 'macOS' && env.HAS_MACOS_CERT == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p ci-keychain build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci-keychain build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci-keychain build.keychain >/dev/null
          rm cert.p12
      - name: Sign, notarize and staple the app
        if: runner.os == 'macOS' && env.HAS_MACOS_CERT == 'true'
        env:
          APPSTORE_P8: ${{ secrets.APPSTORE_P8 }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing as: $IDENTITY"
          APP=$(echo build/macos/*.app)
          # codesign rejects symlinks that are broken or that point outside
          # the bundle (serious_python's framework ships some aimed at build
          # machine paths). They are dead on any user machine — drop them.
          APP_ABS=$(cd "$APP" && pwd)
          find "$APP" -type l | while read -r link; do
            if [ ! -e "$link" ]; then
              echo "removing broken symlink: $link -> $(readlink "$link")"
              rm "$link"
              continue
            fi
            resolved=$(readlink -f "$link")
            case "$resolved" in
              "$APP_ABS"/*) ;;  # stays inside the bundle — keep
              *) echo "removing external symlink: $link -> $resolved"; rm "$link";;
            esac
          done
          # Notarization scans EVERY Mach-O in the bundle — including inside
          # the flutter asset app.zip (the packaged Python app), the embedded
          # python.bundle stdlib and the Python.framework dylibs, none of
          # which `codesign --deep` reaches. Sign inside-out, explicitly.
          sign_binary() {
            codesign --force --options runtime --timestamp -s "$IDENTITY" "$1"
          }
          sign_all_machos_under() {
            find "$1" -type f | while read -r f; do
              if file -b "$f" | grep -q "Mach-O"; then
                echo "signing: $f"
                sign_binary "$f"
              fi
            done
          }
          # 1) app.zip: unpack, sign, repack (zipfile keeps relative paths).
          APPZIP=$(find "$APP" -path "*/flutter_assets/app/app.zip")
          UNPACK=appzip-unpacked
          mkdir "$UNPACK" && unzip -qq "$APPZIP" -d "$UNPACK"
          sign_all_machos_under "$UNPACK"
          rm "$APPZIP"
          python3 - "$UNPACK" "$APPZIP" <<'PY'
          import os, sys, zipfile
          src, out = sys.argv[1], sys.argv[2]
          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as z:
              for root, dirs, files in os.walk(src):
                  for name in files:
                      p = os.path.join(root, name)
                      z.write(p, os.path.relpath(p, src))
          PY
          rm -rf "$UNPACK"
          # 2) every loose Mach-O in the bundle (python.bundle stdlib .so files,
          #    Python.framework dylibs, plugin dylibs, helper executables).
          sign_all_machos_under "$APP/Contents/Frameworks"
          # 3) the frameworks themselves, then the app, inside-out.
          for fw in "$APP"/Contents/Frameworks/*.framework; do
            codesign --force --options runtime --timestamp -s "$IDENTITY" "$fw"
          done
          codesign --force --options runtime --timestamp \
            --entitlements packaging/macos-entitlements.plist \
            -s "$IDENTITY" "$APP"
          codesign --verify --deep --strict "$APP"
          echo "$APPSTORE_P8" | base64 --decode > authkey.p8
          ditto -c -k --keepParent "$APP" notarize.zip
          xcrun notarytool submit notarize.zip --key authkey.p8 \
            --key-id "$APPSTORE_KEY_ID" --issuer "$APPSTORE_ISSUER_ID" --wait
          xcrun stapler staple "$APP"
          rm authkey.p8 notarize.zip
      - name: Package bundle
        shell: bash
        run: |
          # The zips keep their exact names: pre-0.1.8 clients match them when
          # auto-updating. New clients prefer the installer assets below.
          if [ "$RUNNER_OS" = "macOS" ]; then
            # ditto preserves the signed bundle exactly (symlinks, resource
            # forks); a Python zipfile archive can invalidate the signature.
            ditto -c -k "build/macos" "email-export-import-macos.zip"
          else
            # shutil.make_archive is cross-platform — Windows Git Bash has no `zip`.
            uv run python -c "import shutil; shutil.make_archive('email-export-import-${{ matrix.target }}', 'zip', 'build/${{ matrix.target }}')"
          fi
      - name: Rename macOS bundle to the product name
        if: runner.os == 'macOS'
        run: |
          # Finder shows the bundle's FILE name, not CFBundleDisplayName.
          mv build/macos/email-export-import.app "build/macos/Email Export Import Tool.app"
      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          mkdir dmg-staging
          cp -R build/macos/*.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Email Export Import Tool" \
            -srcfolder dmg-staging -ov -format UDZO \
            email-export-import-macos.dmg
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          case "$VER" in *[!0-9.]*) VER="0.0.0";; esac   # non-tag runs (workflow_dispatch)
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" \
            //DAppVersion="$VER" packaging/windows-installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            email-export-import-${{ matrix.target }}.zip
            email-export-import-macos.dmg
            email-export-import-windows-setup.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum email-export-import-* > SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            email-export-import-*.zip
            email-export-import-*.dmg
            email-export-import-*-setup.exe
            SHA256SUMS.txt
          generate_release_notes: true
